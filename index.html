<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Forge — Idle Dice Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e8d5a3;
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .game-container {
    display: grid;
    grid-template-columns: 220px 1fr 240px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    gap: 0;
  }

  .header {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #1a0a00 0%, #0d0d1a 50%, #001a0a 100%);
    border-bottom: 1px solid #3a2a10;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    gap: 12px;
  }

  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: #f0c060;
    text-shadow: 0 0 20px rgba(240,180,60,0.4);
    letter-spacing: 3px;
  }

  .gold-display {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: rgba(255,200,50,0.08);
    border: 1px solid rgba(255,200,50,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill .val {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: #f0c060;
    font-weight: 600;
  }

  .stat-pill .lbl {
    color: #9a8060;
    font-size: 12px;
  }

  .left-panel {
    background: #0d0d16;
    border-right: 1px solid #1e1e30;
    padding: 12px;
    overflow-y: auto;
    max-height: calc(100vh - 58px);
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: #6a5a40;
    text-transform: uppercase;
    padding: 6px 4px;
    border-bottom: 1px solid #1e1e2e;
    margin-bottom: 10px;
  }

  .dice-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .dice-card {
    background: #12121e;
    border: 1px solid #2a2040;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .dice-card:hover {
    border-color: #5a40a0;
    background: #16162a;
  }

  .dice-card.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .dice-card.new-unlock {
    border-color: #ffd700;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
    animation: newUnlock 0.6s ease-out;
  }

  @keyframes newUnlock {
    0% { transform: scale(0.95); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .dice-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.6;
  }

  .dice-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .dice-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .dice-count {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Cinzel', serif;
    color: #e8d5a3;
  }

  .dice-info {
    font-size: 11px;
    color: #7a6a50;
    line-height: 1.4;
  }

  .dice-cost {
    font-size: 12px;
    color: #c8a040;
    margin-top: 4px;
    font-weight: 600;
  }

  .center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-y: auto;
    max-height: calc(100vh - 58px);
    background: #080810;
  }

  .roll-zone {
    width: 100%;
    max-width: 600px;
    background: radial-gradient(ellipse at center, #15152a 0%, #0a0a14 100%);
    border: 1px solid #2a2040;
    border-radius: 16px;
    padding: 20px;
    min-height: 200px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
  }

  .roll-zone::before {
    content: 'ROLL ARENA';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    background: #080810;
    padding: 0 12px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: #3a3050;
  }

  .die-visual {
    width: 54px;
    height: 54px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    border: 2px solid;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
    user-select: none;
  }

  .die-visual:active { transform: scale(0.92); }

  .die-visual.rolling {
    animation: dieRoll 0.4s ease-out;
  }

  @keyframes dieRoll {
    0% { transform: rotate(-20deg) scale(1.2); }
    25% { transform: rotate(15deg) scale(0.9); }
    50% { transform: rotate(-10deg) scale(1.1); }
    75% { transform: rotate(5deg) scale(0.95); }
    100% { transform: rotate(0) scale(1); }
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-60px); }
  }

  .float-num {
    position: fixed;
    pointer-events: none;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 16px;
    animation: floatUp 1s ease-out forwards;
    z-index: 999;
  }

  .roll-btn {
    background: linear-gradient(135deg, #3a1a60 0%, #6a3a90 100%);
    border: 1px solid #8a5ab0;
    color: #e8c8ff;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 36px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
    box-shadow: 0 4px 20px rgba(100,50,150,0.3);
    margin-bottom: 12px;
    width: 100%;
    max-width: 300px;
  }

  .roll-btn:hover {
    background: linear-gradient(135deg, #5a2a80 0%, #8a5ab0 100%);
    box-shadow: 0 6px 30px rgba(120,60,180,0.5);
  }

  .roll-btn:active { transform: scale(0.97); }

  .auto-roll-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    width: 100%;
    max-width: 500px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .auto-btn {
    background: #1a1a2a;
    border: 1px solid #3a3060;
    color: #a090c0;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .auto-btn.active {
    background: #2a1a4a;
    border-color: #7a50b0;
    color: #c8a0f0;
    box-shadow: 0 0 10px rgba(120,80,200,0.3);
  }

  .auto-btn:hover { border-color: #5a4080; }

  .combo-display {
    width: 100%;
    max-width: 500px;
    margin-bottom: 12px;
  }

  .combo-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 8px;
  }

  .combo-badge {
    background: rgba(255,200,50,0.1);
    border: 1px solid rgba(255,200,50,0.3);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: #e0b040;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .combo-badge.active { opacity: 1; }

  .roll-history {
    width: 100%;
    max-width: 500px;
    background: #0d0d18;
    border: 1px solid #1e1e30;
    border-radius: 10px;
    padding: 12px;
    max-height: 140px;
    overflow-y: auto;
  }

  .history-title {
    font-size: 10px;
    letter-spacing: 2px;
    color: #4a4060;
    font-family: 'Cinzel', serif;
    margin-bottom: 8px;
  }

  .history-entry {
    font-size: 12px;
    color: #6a5a40;
    padding: 2px 0;
    border-bottom: 1px solid #1a1a28;
    display: flex;
    justify-content: space-between;
  }

  .history-entry .h-val { color: #c0a060; }

  .right-panel {
    background: #0d0d16;
    border-left: 1px solid #1e1e30;
    padding: 12px;
    overflow-y: auto;
    max-height: calc(100vh - 58px);
  }

  .upgrade-card {
    background: #12121e;
    border: 1px solid #2a2040;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .upgrade-card:hover:not(.disabled) {
    border-color: #5a9040;
    background: #14181e;
  }

  .upgrade-card.disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .upgrade-card.purchased {
    border-color: #2a4020;
    opacity: 0.5;
  }

  .upg-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: #80c060;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .upg-desc {
    font-size: 11px;
    color: #7a6a50;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .upg-cost {
    font-size: 12px;
    color: #c8a040;
    font-weight: 600;
  }

  .prestige-section {
    margin-top: 16px;
    padding: 12px;
    background: #100a1a;
    border: 1px solid #4a2060;
    border-radius: 10px;
  }

  .prestige-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #c080f0;
    margin-bottom: 6px;
    font-weight: 600;
  }

  .prestige-btn {
    width: 100%;
    background: linear-gradient(135deg, #3a0a5a, #7a3090);
    border: 1px solid #9a50c0;
    color: #e0c0ff;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  .prestige-btn:hover { background: linear-gradient(135deg, #5a1a7a, #9a50b0); }
  .prestige-btn.disabled { opacity: 0.4; cursor: not-allowed; }

  .prestige-desc {
    font-size: 11px;
    color: #8a6aaa;
    line-height: 1.5;
  }

  .prestige-count {
    display: inline-block;
    background: rgba(180,80,255,0.15);
    border: 1px solid rgba(180,80,255,0.3);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
    color: #c080f0;
    margin-bottom: 6px;
  }

  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 10px;
    border: 1px solid #2a2040;
    border-radius: 8px;
    overflow: hidden;
    flex-wrap: wrap;
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: #6a5a40;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 4px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 60px;
  }

  .tab-btn.active {
    background: #2a1a4a;
    color: #c0a0f0;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .achievement {
    background: #12121e;
    border: 1px solid #2a2040;
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.4;
    transition: opacity 0.3s;
  }

  .achievement.unlocked {
    opacity: 1;
    border-color: #5a4020;
    background: #181410;
  }

  .ach-icon { font-size: 18px; }
  .ach-info { flex: 1; }
  .ach-name { font-size: 12px; font-family: 'Cinzel', serif; color: #c8a040; }
  .ach-desc { font-size: 10px; color: #7a6a50; }

  #notif-area {
    position: fixed;
    top: 70px;
    right: 16px;
    z-index: 1000;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .notif {
    background: #1a1a2e;
    border: 1px solid #4a3a70;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: #c0a0e0;
    font-family: 'Cinzel', serif;
    animation: slideIn 0.3s ease-out, fadeOut 0.5s ease-in 2s forwards;
    max-width: 260px;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  .progress-bar {
    background: #1a1a28;
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
    margin-top: 4px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
  }

  .dice-face-label {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 8px;
    opacity: 0.5;
  }

  .prestige-calc {
    background: #0d0d18;
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 10px;
    margin-top: 12px;
    font-size: 11px;
    color: #7a6a50;
  }

  .prestige-calc-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .prestige-calc-val {
    color: #c0a060;
    font-weight: 600;
  }

  .event-banner {
    background: linear-gradient(135deg, #2a1a4a 0%, #4a2a6a 100%);
    border: 2px solid #8a50c0;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; }
  }

  .event-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #ffd700;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .event-desc {
    font-size: 11px;
    color: #e0c0ff;
    line-height: 1.4;
  }

  .event-progress {
    background: #0a0a14;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-top: 6px;
  }

  .event-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ffd700, #ff8c00);
    transition: width 0.3s;
  }

  .offline-gains {
    background: #0d1a0d;
    border: 1px solid #2a4a2a;
    border-radius: 8px;
    padding: 10px;
    margin-top: 12px;
    font-size: 11px;
    color: #7aa07a;
  }

  .offline-val {
    color: #80ff80;
    font-weight: 600;
    font-family: 'Cinzel', serif;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0a14; }
  ::-webkit-scrollbar-thumb { background: #2a2040; border-radius: 4px; }

  @media (max-width: 900px) {
    .game-container { grid-template-columns: 1fr; }
    .left-panel, .right-panel { max-height: 300px; }
    .header { gap: 8px; }
    .gold-display { gap: 10px; }
    .stat-pill { font-size: 11px; padding: 4px 10px; }
    .game-title { font-size: 18px; letter-spacing: 2px; }
  }

  @media (max-width: 600px) {
    .game-container { grid-template-columns: 1fr; }
    .header { padding: 10px; }
    .gold-display { gap: 6px; }
    .stat-pill { font-size: 10px; padding: 3px 8px; }
    .game-title { font-size: 16px; }
    .die-visual { width: 45px; height: 45px; font-size: 16px; }
    .roll-btn { font-size: 13px; padding: 12px 24px; }
    .tab-btn { font-size: 9px; padding: 5px 3px; }
  }
</style>
</head>
<body>

<div id="notif-area"></div>

<div class="game-container">
  <div class="header">
    <div class="game-title">⬡ DICE FORGE</div>
    <div class="gold-display">
      <div class="stat-pill">
        <span class="val" id="gold-display">0</span>
        <span class="lbl">gold</span>
      </div>
      <div class="stat-pill">
        <span class="val" id="per-sec">0</span>
        <span class="lbl">/ sec</span>
      </div>
      <div class="stat-pill">
        <span class="val" id="total-rolled">0</span>
        <span class="lbl">rolled</span>
      </div>
      <div class="stat-pill">
        <span class="val" id="prestige-display">0</span>
        <span class="lbl">⋆ prestige</span>
      </div>
    </div>
  </div>

  <div class="left-panel">
    <div class="panel-title">⚄ Dice Foundry</div>
    <div id="event-display"></div>
    <div class="dice-grid" id="dice-shop"></div>
  </div>

  <div class="center-panel">
    <div class="roll-zone" id="roll-zone">
      <div style="color:#2a2040;font-size:13px;font-family:'Cinzel',serif;letter-spacing:2px;">BUY DICE TO BEGIN</div>
    </div>

    <div class="combo-display">
      <div class="combo-row" id="combo-row"></div>
    </div>

    <button class="roll-btn" onclick="rollAll()">⚄ ROLL ALL DICE</button>

    <div class="auto-roll-row">
      <span style="font-size:11px;color:#4a4060;font-family:'Cinzel',serif;">AUTO:</span>
      <button class="auto-btn active" id="auto-btn-0" onclick="setAutoSpeed(0)">OFF</button>
      <button class="auto-btn" id="auto-btn-1" onclick="setAutoSpeed(1)">1/s</button>
      <button class="auto-btn" id="auto-btn-2" onclick="setAutoSpeed(2)">2/s</button>
      <button class="auto-btn" id="auto-btn-4" onclick="setAutoSpeed(4)">4/s</button>
      <button class="auto-btn" id="auto-btn-10" onclick="setAutoSpeed(10)">10/s</button>
    </div>

    <div id="offline-notice"></div>

    <div class="roll-history" id="roll-history">
      <div class="history-title">ROLL HISTORY</div>
      <div id="history-entries"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('upgrades', this)">UPGRADES</button>
      <button class="tab-btn" onclick="switchTab('prestige', this)">PRESTIGE</button>
      <button class="tab-btn" onclick="switchTab('achievements', this)">TROPHIES</button>
      <button class="tab-btn" onclick="switchTab('stats', this)">STATS</button>
    </div>

    <div class="tab-content active" id="tab-upgrades">
      <div class="panel-title">⚗ Enchantments</div>
      <div id="upgrade-list"></div>
    </div>

    <div class="tab-content" id="tab-prestige">
      <div class="panel-title">✦ Prestige</div>
      <div class="prestige-section" style="margin-top: 0; background: transparent; border: none; padding: 0;">
        <div class="prestige-count" id="prestige-stars">✦ 0 times</div>
        <div class="prestige-desc" id="prestige-desc">Reach 1,000,000 gold to unlock prestige.</div>
        <button class="prestige-btn disabled" id="prestige-btn" onclick="doPrestige()">ASCEND</button>
        <div class="prestige-calc" id="prestige-calc"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-achievements">
      <div class="panel-title">⚑ Trophies</div>
      <div id="achievement-list"></div>
    </div>

    <div class="tab-content" id="tab-stats">
      <div class="panel-title">📊 Statistics</div>
      <div id="stats-panel" style="font-size:12px;color:#7a6a50;line-height:2;"></div>
    </div>
  </div>
</div>

<script>
const DICE_TYPES = [
  { id: 'd4', name: 'D4 Shard', faces: 4, baseCost: 10, mult: 1.15, color: '#60c0ff', baseGold: 1.5, desc: 'Mystic tetrahedron. Fast and lucky.' },
  { id: 'd6', name: 'D6 Cube', faces: 6, baseCost: 75, mult: 1.18, color: '#80ff80', baseGold: 3, desc: 'Classic cube of fortune.' },
  { id: 'd8', name: 'D8 Octahedra', faces: 8, baseCost: 400, mult: 1.2, color: '#ffaa40', baseGold: 8, desc: 'Double pyramid of power.' },
  { id: 'd10', name: 'D10 Decahedron', faces: 10, baseCost: 2000, mult: 1.22, color: '#ff6080', baseGold: 18, desc: 'Ten-sided chaos gem.' },
  { id: 'd12', name: 'D12 Dodecahedra', faces: 12, baseCost: 12000, mult: 1.25, color: '#c060ff', baseGold: 45, desc: 'Pentagonal faces of destiny.' },
  { id: 'd20', name: 'D20 Icosahedra', faces: 20, baseCost: 80000, mult: 1.28, color: '#ff4060', baseGold: 150, desc: 'The legendary twenty-sider.' },

let G = {
  gold: 50,
  totalGoldEarned: 0,
  totalRolled: 0,
  prestige: 0,
  prestigeBonus: 0,
  upgradesBought: 0,
  dice: {},
  diceMult: {},
  globalMult: 1,
  comboMult: 2,
  chainBonus: 1,
  autoBonus: 1,
  critMult: 3,
  comboCascade: false,
  nat20: false,
  bestCombo: 0,
  history: [],
  achievementsDone: new Set(),
  upgradesDone: new Set(),
  lastRolls: [],
  autoSpeed: 0,
  passiveGoldEnabled: false,
  lastSaveTime: Date.now(),
  activeEvent: null,
  eventProgress: 0,
  eventData: {},
};

let autoInterval = null;

G.totalDice = function() {
  return Object.values(this.dice).reduce((a,b)=>a+b,0);
};

function fmt(n) {
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function loadGame() {
  const saved = localStorage.getItem('IdleDice');
  if (saved) {
    const data = JSON.parse(saved);
    Object.assign(G, data);
    G.achievementsDone = new Set(data.achievementsDone || []);
    G.upgradesDone = new Set(data.upgradesDone || []);
    
    // Handle offline gains
    const now = Date.now();
    const timeDiff = (now - G.lastSaveTime) / 1000;
    if (timeDiff > 60 && G.passiveGoldEnabled) {
      let perSec = 0;
      DICE_TYPES.forEach(d => {
        const count = G.dice[d.id] || 0;
        const avgVal = (d.faces + 1) / 2;
        const goldPerRoll = avgVal * d.baseGold * (G.diceMult[d.id]||1) * G.globalMult * (1 + G.prestigeBonus * G.prestige) * (G.autoBonus||1);
        perSec += count * goldPerRoll;
      });
      const offlineGains = perSec * Math.min(timeDiff, 3600) * 0.05; // 5% of normal
      G.gold += offlineGains;
      showOfflineNotice(offlineGains, timeDiff);
    }
    G.lastSaveTime = now;
  }
}

function saveGame() {
  const data = {
    ...G,
    achievementsDone: Array.from(G.achievementsDone),
    upgradesDone: Array.from(G.upgradesDone),
    lastSaveTime: Date.now(),
  };
  localStorage.setItem('IdleDice', JSON.stringify(data));
}

function showOfflineNotice(gains, timeSec) {
  const hours = Math.floor(timeSec / 3600);
  const mins = Math.floor((timeSec % 3600) / 60);
  let timeStr = '';
  if (hours > 0) timeStr += hours + 'h ';
  if (mins > 0) timeStr += mins + 'm';
  
  const el = document.getElementById('offline-notice');
  el.innerHTML = '<div class="offline-gains">⏰ Offline for ' + timeStr + '<br>💰 Earned ' + fmt(gains) + ' passive gold</div>';
}

function getDiceCost(dtype) {
  const d = DICE_TYPES.find(x=>x.id===dtype);
  const owned = G.dice[dtype] || 0;
  return Math.floor(d.baseCost * Math.pow(d.mult, owned));
}

function rollDie(faces) {
  return Math.floor(Math.random() * faces) + 1;
}

function getGoldForRoll(diceId, value) {
  const d = DICE_TYPES.find(x=>x.id===diceId);
  let gold = value * d.baseGold;
  gold *= (G.diceMult[diceId] || 1);
  gold *= G.globalMult;
  gold *= (1 + G.prestigeBonus * G.prestige);
  return gold;
}

function rollAll(isAuto) {
  if (G.totalDice() === 0) { notify('Buy dice in the Foundry first!'); return; }

  const allRolls = [];
  let totalGold = 0;
  const rollZone = document.getElementById('roll-zone');
  const visuals = rollZone.querySelectorAll('.die-visual');

  DICE_TYPES.forEach(d => {
    const count = G.dice[d.id] || 0;
    for (let i = 0; i < count; i++) {
      const val = rollDie(d.faces);
      const gold = getGoldForRoll(d.id, val);
      allRolls.push({ diceId: d.id, val, faces: d.faces, gold, isMax: val === d.faces });
    }
  });

  G.totalRolled++;
  if (G.activeEvent) G.eventProgress++;

  const valCounts = {};
  allRolls.forEach(r => { valCounts[r.val] = (valCounts[r.val]||0)+1; });
  let comboBonus = 1;
  let comboText = '';
  let bestCombo = 0;
  Object.entries(valCounts).forEach(([val, cnt]) => {
    if (cnt > 1) {
      if (cnt > bestCombo) bestCombo = cnt;
      comboBonus += (cnt-1) * (G.comboMult - 1);
      comboText += cnt + '× ' + val + '! ';
    }
  });
  if (bestCombo > G.bestCombo) G.bestCombo = bestCombo;

  let chainMult = (G.chainBonus > 1 && G.totalDice() >= 5) ? G.chainBonus : 1;

  const critCount = allRolls.filter(r => r.isMax).length;
  let critMult = critCount > 0 && G.critMult > 1 ? 1 + (critCount * (G.critMult - 1) * 0.3) : 1;

  let autoMult = isAuto ? (G.autoBonus || 1) : 1;

  allRolls.forEach(r => { totalGold += r.gold; });
  totalGold *= comboBonus * chainMult * critMult * autoMult;

  if (allRolls.some(r => r.diceId === 'd20' && r.val === 20)) {
    G.nat20 = true;
    totalGold *= 3;
    notify('⭐ NATURAL 20! Triple gold!');
  }

  G.gold += totalGold;
  G.totalGoldEarned += totalGold;

  visuals.forEach(v => {
    v.classList.add('rolling');
    setTimeout(()=>v.classList.remove('rolling'), 400);
  });

  let rollIdx = 0;
  visuals.forEach(v => {
    if (rollIdx < allRolls.length) {
      const label = v.querySelector('.dice-face-label');
      v.textContent = allRolls[rollIdx].val;
      if (label) v.appendChild(label);
      rollIdx++;
    }
  });

  if (!isAuto || G.autoSpeed <= 2) {
    const btn = document.querySelector('.roll-btn');
    const rect = btn.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'float-num';
    el.style.left = (rect.left + rect.width/2 - 30) + 'px';
    el.style.top = (rect.top - 10) + 'px';
    el.style.color = totalGold > 1000 ? '#ffd700' : '#c0a060';
    el.textContent = '+' + fmt(totalGold);
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1100);
  }

  G.history.unshift({ total: totalGold, combo: comboText, rolls: allRolls.length, crit: critCount });
  if (G.history.length > 20) G.history.pop();

  updateComboBadges(comboText, critCount, critMult);
  checkAchievements();
  checkEvent();
  updateUI();
  updateHistory();
  saveGame();
}

function updateComboBadges(comboText, critCount, critMult) {
  const row = document.getElementById('combo-row');
  row.innerHTML = '';
  if (comboText) {
    const b = document.createElement('div');
    b.className = 'combo-badge active';
    b.textContent = '🎯 COMBO: ' + comboText;
    row.appendChild(b);
  }
  if (critCount > 0) {
    const b = document.createElement('div');
    b.className = 'combo-badge active';
    b.style.borderColor = 'rgba(255,80,60,0.4)';
    b.style.color = '#ff8060';
    b.style.background = 'rgba(255,80,60,0.1)';
    b.textContent = critCount + ' CRIT' + (critCount>1?'S':'') + '! ×' + critMult.toFixed(1);
    row.appendChild(b);
  }
}

function setAutoSpeed(speed) {
  G.autoSpeed = speed;
  document.querySelectorAll('.auto-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('auto-btn-' + speed).classList.add('active');
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  if (speed > 0) {
    autoInterval = setInterval(() => rollAll(true), 1000 / speed);
  }
  saveGame();
}

function startRandomEvent() {
  if (Math.random() > 0.3) return;
  const challenge = CHALLENGES[Math.floor(Math.random() * CHALLENGES.length)];
  G.activeEvent = challenge.id;
  G.eventProgress = 0;
  G.eventData = { startTime: Date.now(), ...challenge };
  notify('⚡ ' + challenge.name + ' started!');
}

function checkEvent() {
  if (!G.activeEvent) {
    if (Math.random() > 0.95) startRandomEvent();
    return;
  }
  const event = G.eventData;
  if (G.eventProgress >= event.target) {
    G.gold *= event.rollBonus;
    notify('🎉 Challenge complete! Rolled gold × ' + event.rollBonus);
    G.activeEvent = null;
    G.eventProgress = 0;
  } else if (Date.now() - event.startTime > event.duration * 1000) {
    G.activeEvent = null;
    G.eventProgress = 0;
  }
}

function buildEventDisplay() {
  const el = document.getElementById('event-display');
  if (!G.activeEvent) {
    el.innerHTML = '';
    return;
  }
  const event = G.eventData;
  const progress = Math.min(100, (G.eventProgress / event.target) * 100);
  el.innerHTML = 
    '<div class="event-banner">' +
      '<div class="event-title">' + event.name + '</div>' +
      '<div class="event-desc">' + event.desc + '</div>' +
      '<div class="event-progress"><div class="event-progress-fill" style="width:' + progress + '%"></div></div>' +
      '<div style="font-size:10px;color:#c0a0ff;margin-top:4px;">' + G.eventProgress + ' / ' + event.target + '</div>' +
    '</div>';
}

function buildDiceShop() {
  const shop = document.getElementById('dice-shop');
  shop.innerHTML = '';
  DICE_TYPES.forEach(d => {
    const owned = G.dice[d.id] || 0;
    const cost = getDiceCost(d.id);
    const canAfford = G.gold >= cost;
    const card = document.createElement('div');
    card.className = 'dice-card' + (canAfford ? '' : ' disabled');
    if (owned === 0 && cost <= G.totalGoldEarned * 10) card.classList.add('new-unlock');
    card.style.setProperty('--accent', d.color);
    card.innerHTML =
      '<div class="dice-header">' +
        '<span class="dice-name">' + d.name + '</span>' +
        '<span class="dice-count">' + owned + '</span>' +
      '</div>' +
      '<div class="dice-info">' + d.desc + '<br>d' + (d.faces>=1000?'∞':d.faces) + ' • avg: ' + fmt(d.baseGold*(d.faces+1)/2) + '/roll</div>' +
      '<div class="dice-cost">💰 ' + fmt(cost) + '</div>' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(100,(G.gold/cost)*100) + '%;background:' + d.color + ';opacity:0.6;"></div></div>';
    card.onclick = () => buyDice(d.id);
    shop.appendChild(card);
  });
}

function buyDice(id) {
  const cost = getDiceCost(id);
  if (G.gold < cost) return;
  G.gold -= cost;
  G.dice[id] = (G.dice[id] || 0) + 1;
  buildRollZone();
  buildDiceShop();
  checkAchievements();
  updateUI();
  buildUpgrades();
  saveGame();
}

function buildRollZone() {
  const zone = document.getElementById('roll-zone');
  zone.innerHTML = '';
  let total = 0;
  DICE_TYPES.forEach(d => {
    const count = G.dice[d.id] || 0;
    for (let i = 0; i < count; i++) {
      total++;
      const die = document.createElement('div');
      die.className = 'die-visual';
      die.style.background = d.color + '18';
      die.style.borderColor = d.color + '60';
      die.style.color = d.color;
      die.textContent = Math.floor(Math.random()*d.faces)+1;
      die.title = d.name;
      const label = document.createElement('div');
      label.className = 'dice-face-label';
      label.textContent = 'd'+(d.faces>=1000?'∞':d.faces);
      die.appendChild(label);
      die.onclick = () => rollSingle(d.id, die);
      zone.appendChild(die);
    }
  });
  if (total === 0) {
    zone.innerHTML = '<div style="color:#2a2040;font-size:13px;font-family:\'Cinzel\',serif;letter-spacing:2px;">BUY DICE TO BEGIN</div>';
  }
}

function rollSingle(diceId, el) {
  const d = DICE_TYPES.find(x=>x.id===diceId);
  const val = rollDie(d.faces);
  const gold = getGoldForRoll(diceId, val);
  G.gold += gold;
  G.totalGoldEarned += gold;
  G.totalRolled++;
  const label = el.querySelector('.dice-face-label');
  el.textContent = val;
  if (label) el.appendChild(label);
  el.classList.add('rolling');
  setTimeout(()=>el.classList.remove('rolling'), 400);
  updateUI();
  checkAchievements();
  saveGame();
}

function buildUpgrades() {
  const list = document.getElementById('upgrade-list');
  list.innerHTML = '';
  UPGRADES.forEach(u => {
    if (G.upgradesDone.has(u.id)) {
      const card = document.createElement('div');
      card.className = 'upgrade-card purchased';
      card.innerHTML = '<div class="upg-name">✓ ' + u.name + '</div><div class="upg-desc">' + u.desc + '</div>';
      list.appendChild(card);
      return;
    }
    const avail = u.condition(G);
    const canAfford = G.gold >= u.cost;
    const card = document.createElement('div');
    card.className = 'upgrade-card' + (avail && canAfford ? '' : ' disabled');
    if (avail) {
      card.innerHTML = '<div class="upg-name">' + u.name + '</div><div class="upg-desc">' + u.desc + '</div><div class="upg-cost">💰 ' + fmt(u.cost) + '</div>';
    } else {
      card.innerHTML = '<div class="upg-name" style="color:#4a4060">' + u.name + '</div><div class="upg-desc">' + u.desc + '</div><div class="upg-cost" style="color:#4a3a20">🔒 Locked</div>';
    }
    card.onclick = () => {
      if (!avail || !canAfford) return;
      G.gold -= u.cost;
      u.effect(G);
      G.upgradesDone.add(u.id);
      G.upgradesBought++;
      notify('⚗ ' + u.name + ' enchanted!');
      buildUpgrades();
      updateUI();
      checkAchievements();
      saveGame();
    };
    list.appendChild(card);
  });
}

function buildAchievements() {
  const list = document.getElementById('achievement-list');
  list.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const done = G.achievementsDone.has(a.id);
    const el = document.createElement('div');
    el.className = 'achievement' + (done ? ' unlocked' : '');
    el.innerHTML = '<div class="ach-icon">' + a.icon + '</div><div class="ach-info"><div class="ach-name">' + a.name + '</div><div class="ach-desc">' + a.desc + '</div></div>';
    list.appendChild(el);
  });
}

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!G.achievementsDone.has(a.id) && a.condition(G)) {
      G.achievementsDone.add(a.id);
      notify('⚑ Trophy: ' + a.name + ' — ' + a.desc);
      buildAchievements();
      saveGame();
    }
  });
}

function updateHistory() {
  const container = document.getElementById('history-entries');
  container.innerHTML = '';
  G.history.slice(0,10).forEach(h => {
    const el = document.createElement('div');
    el.className = 'history-entry';
    el.innerHTML = '<span>' + h.rolls + ' dice' + (h.combo ? ' • '+h.combo.trim() : '') + '</span><span class="h-val">+' + fmt(h.total) + '</span>';
    container.appendChild(el);
  });
}

function updateUI() {
  document.getElementById('gold-display').textContent = fmt(G.gold);
  document.getElementById('total-rolled').textContent = fmt(G.totalRolled);
  document.getElementById('prestige-display').textContent = G.prestige;

  let perSec = 0;
  if (G.autoSpeed > 0) {
    DICE_TYPES.forEach(d => {
      const count = G.dice[d.id] || 0;
      const avgVal = (d.faces + 1) / 2;
      const goldPerRoll = avgVal * d.baseGold * (G.diceMult[d.id]||1) * G.globalMult * (1 + G.prestigeBonus * G.prestige) * (G.autoBonus||1);
      perSec += count * goldPerRoll * G.autoSpeed;
    });
  }
  document.getElementById('per-sec').textContent = fmt(perSec);

  updatePrestigeCalc();
  
  const stats = document.getElementById('stats-panel');
  if (stats) {
    stats.innerHTML =
      '<div>Total Rolls: <b style="color:#c0a060">' + fmt(G.totalRolled) + '</b></div>' +
      '<div>Total Gold Earned: <b style="color:#c0a060">' + fmt(G.totalGoldEarned) + '</b></div>' +
      '<div>Gold Multiplier: <b style="color:#c0a060">×' + G.globalMult.toFixed(1) + '</b></div>' +
      '<div>Prestige Bonus: <b style="color:#c0a060">+' + (G.prestigeBonus * G.prestige * 100).toFixed(0) + '%</b></div>' +
      '<div>Upgrades Bought: <b style="color:#c0a060">' + G.upgradesBought + '</b></div>' +
      '<div>Best Combo: <b style="color:#c0a060">' + G.bestCombo + '× match</b></div>' +
      '<div>Total Dice: <b style="color:#c0a060">' + G.totalDice() + '</b></div>' +
      '<div>Achievements: <b style="color:#c0a060">' + G.achievementsDone.size + ' / ' + ACHIEVEMENTS.length + '</b></div>';
  }

  buildEventDisplay();
  buildDiceShop();
  buildUpgrades();
}

function updatePrestigeCalc() {
  const calc = document.getElementById('prestige-calc');
  const prestigeReq = 1000000 * Math.pow(5, G.prestige);
  const nextReq = 1000000 * Math.pow(5, G.prestige + 1);
  
  const prestigeBonus = (G.prestigeBonus + 0.2) * (G.prestige + 1) * 100;
  
  calc.innerHTML = 
    '<div class="prestige-calc-row">' +
      '<span>Current requirement:</span>' +
      '<span class="prestige-calc-val">' + fmt(prestigeReq) + ' gold</span>' +
    '</div>' +
    '<div class="prestige-calc-row">' +
      '<span>Next prestige req:</span>' +
      '<span class="prestige-calc-val">' + fmt(nextReq) + ' gold</span>' +
    '</div>' +
    '<div class="prestige-calc-row">' +
      '<span>Your bonus (next):</span>' +
      '<span class="prestige-calc-val">+' + prestigeBonus.toFixed(0) + '%</span>' +
    '</div>' +
    '<div class="prestige-calc-row">' +
      '<span>Progress:</span>' +
      '<span class="prestige-calc-val">' + ((G.totalGoldEarned / prestigeReq) * 100).toFixed(1) + '%</span>' +
    '</div>';
}

function doPrestige() {
  const prestigeReq = 1000000 * Math.pow(5, G.prestige);
  if (G.totalGoldEarned < prestigeReq) return;
  G.prestige++;
  G.prestigeBonus += 0.2;
  G.gold = 50;
  G.totalGoldEarned = 0;
  G.dice = {};
  G.diceMult = {};
  G.globalMult = 1;
  G.comboMult = 2;
  G.chainBonus = 1;
  G.autoBonus = 1;
  G.critMult = 3;
  G.comboCascade = false;
  G.upgradesDone = new Set();
  G.upgradesBought = 0;
  G.history = [];
  G.lastRolls = [];
  G.activeEvent = null;
  G.eventProgress = 0;
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
  G.autoSpeed = 0;
  document.querySelectorAll('.auto-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('auto-btn-0').classList.add('active');
  buildRollZone();
  buildAchievements();
  notify('✦ ASCENDED to Prestige ' + G.prestige + '! +20% permanent gold bonus!');
  updateUI();
  saveGame();
}

function notify(msg) {
  const area = document.getElementById('notif-area');
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(()=>el.remove(), 2700);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'achievements') buildAchievements();
}

// Initialize
loadGame();
buildDiceShop();
buildRollZone();
buildUpgrades();
buildAchievements();
updateUI();

// Auto-save every 10 seconds
setInterval(() => saveGame(), 10000);

// Periodic tab visibility check for offline gains
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    loadGame();
    updateUI();
  }
});
</script>
</body>
</html>
